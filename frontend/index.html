<!DOCTYPE html>
<html>
<head>
    <title>Mechanical Keyboard Store</title>
</head>
<body>
    <h1>Mechanical Keyboard (ID: P001)</h1>
    <h2>Stock remaining: <span id="stock-count">10</span></h2>
    
    <label for="payment-method">Choose Payment:</label>
    <select id="payment-method">
        <option value="CreditCard">Credit Card</option>
        <option value="Bitcoin">Bitcoin</option>
        <option value="GiftCard">Store Gift Card</option>
    </select>
    <br><br>

    <button id="buy-button">BUY NOW ($99.99)</button>

    <script>
        document.getElementById("buy-button").addEventListener("click", function() {
            
            // 2. Look at what the user selected in the dropdown
            const selectedPayment = document.getElementById("payment-method").value;

            // 3. Send the upgraded JSON order slip!
            fetch("http://localhost:8080/buy", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "productId": "P001", 
                    "quantity": 1,
                    "paymentType": selectedPayment // <-- NEW!
                }) 
            })
            .then(response => response.text())
            .then(text => {
                alert("Server says: " + text);
            })
            .catch(error => {
                alert("Uh oh, the browser blocked the request!");
            });

        });
    </script>
</body>
</html>
